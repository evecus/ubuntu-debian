#==========================================================================
# 用途：单独编译 Ubuntu arm64 rootfs 并发布到 Release
# 支持：noble (24.04 LTS) / resolute (26.04 LTS)
# 说明：编译完成后，在 build-ubuntu-amlogic.yml 的 rootfs_url 填入
#       Release 附件链接即可跳过重新编译（节省 60-90 分钟）
# 触发：手动 workflow_dispatch
#==========================================================================
name: Build Ubuntu RootFS 26

on:
  workflow_dispatch:
    inputs:
      ubuntu_release:
        description: "Ubuntu 版本"
        required: false
        default: "resolute"
        type: choice
        options:
          - resolute

      root_password:
        description: "root 密码"
        required: false
        default: "1234"
        type: string

      hostname:
        description: "主机名"
        required: false
        default: "ubuntu"
        type: string

      timezone:
        description: "时区"
        required: false
        default: "Asia/Shanghai"
        type: choice
        options:
          - Asia/Shanghai
          - Asia/Tokyo
          - America/New_York
          - Europe/London
          - UTC

      extra_packages:
        description: "额外安装的包（空格分隔，留空则只安装基础包）"
        required: false
        default: ""
        type: string


env:
  TZ: UTC
  # Ubuntu 官方 ports 源（arm64 在 ports 上）
  UBUNTU_MIRROR: "http://ports.ubuntu.com/ubuntu-ports"
  ROOTFS_DIR: /builder/ubuntu-rootfs

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event_name == 'schedule' || github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 初始化环境 ──────────────────────────────────────────────────
      - name: Initialize environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile

          sudo -E apt-get -y update
          sudo -E apt-get -y purge \
            azure-cli ghc* zulu* llvm* firefox google* dotnet* \
            powershell openjdk* mongodb* moby* 2>/dev/null || true
          sudo -E apt-get -y install \
            debootstrap \
            openssl pigz curl wget xz-utils
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo -E timedatectl set-timezone "${TZ}"

          # schedule 触发时使用默认值
          echo "UBUNTU_RELEASE=${{ inputs.ubuntu_release || 'noble' }}"  >> "${GITHUB_ENV}"
          echo "ROOT_PASSWORD=${{ inputs.root_password   || '1234' }}"   >> "${GITHUB_ENV}"
          echo "HOSTNAME_VAL=${{ inputs.hostname         || 'ubuntu' }}" >> "${GITHUB_ENV}"
          echo "TZ_VAL=${{ inputs.timezone               || 'Asia/Shanghai' }}" >> "${GITHUB_ENV}"
          echo "EXTRA_PKGS=${{ inputs.extra_packages     || '' }}"        >> "${GITHUB_ENV}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 2. 合并磁盘空间（/mnt + / → /builder，约 44 GB）──────────────
      - name: Create build disk
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}G"  /mnt/mnt.img
          sudo truncate -s "${root_size}G" /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          echo "可用空间: $(df -h /builder | tail -1 | awk '{print $4}')"

      # ── 3. 构建 Ubuntu rootfs ─────────────────────────────────────────
      - name: Build Ubuntu rootfs
        id: rootfs
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          set -euo pipefail

          # ── debootstrap ────────────────────────────────────────────────
          # ubuntu-24.04-arm 是原生 arm64，无需 qemu 模拟
          echo "▶ debootstrap (${UBUNTU_RELEASE})..."
          sudo mkdir -p "${ROOTFS_DIR}"
          sudo debootstrap \
            --arch=arm64 --include=ca-certificates \
            "${UBUNTU_RELEASE}" "${ROOTFS_DIR}" "${UBUNTU_MIRROR}/"

          # ── 挂载虚拟文件系统 ──────────────────────────────────────────
          echo "▶ 挂载虚拟文件系统..."
          sudo mount -t proc /proc "${ROOTFS_DIR}/proc"
          sudo mount -t sysfs /sys "${ROOTFS_DIR}/sys"
          sudo mount --bind /dev "${ROOTFS_DIR}/dev"
          sudo mount --bind /dev/pts "${ROOTFS_DIR}/dev/pts"

          # 使用 trap 确保无论脚本是否报错，最后都会执行卸载
          function cleanup {
            echo "▶ 正在卸载虚拟文件系统..."
            sudo umount -l "${ROOTFS_DIR}/proc"    || true
            sudo umount -l "${ROOTFS_DIR}/sys"     || true
            sudo umount -l "${ROOTFS_DIR}/dev/pts" || true
            sudo umount -l "${ROOTFS_DIR}/dev"     || true
          }
          trap cleanup EXIT

          # ── apt 源配置：DEB822 格式（Ubuntu 24.04 新格式）────────────
          sudo rm -f "${ROOTFS_DIR}/etc/apt/sources.list"
          sudo tee "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources" > /dev/null << 'SOURCES_EOF'
          Types: deb
          URIs: MIRROR_PLACEHOLDER
          Suites: RELEASE_PLACEHOLDER RELEASE_PLACEHOLDER-updates RELEASE_PLACEHOLDER-backports RELEASE_PLACEHOLDER-security
          Components: main restricted universe multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES_EOF
          # 替换占位符为实际变量值
          sudo sed -i "s|MIRROR_PLACEHOLDER|${UBUNTU_MIRROR}|g"      "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources"
          sudo sed -i "s|RELEASE_PLACEHOLDER|${UBUNTU_RELEASE}|g"    "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources"
          # 去除 heredoc 带来的行首缩进空格
          sudo sed -i 's/^[[:space:]]*//' "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources"

          echo "▶ 安装基础软件包..."
          sudo chroot "${ROOTFS_DIR}" /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq

            # resolute(26.04) initramfs-tools 강제 설치
            apt-get install -y dracut- initramfs-tools --no-install-recommends 2>/dev/null || \
            apt-get install -y initramfs-tools --no-install-recommends

            apt-get install -y \
              openssh-server sudo curl wget ca-certificates \
              locales tzdata fdisk \
              iproute2 network-manager netplan.io \
              net-tools iputils-ping dnsutils \
              chrony \
              bash-completion htop nano nftables bc \
              u-boot-tools initramfs-tools parted \
              btrfs-progs e2fsprogs dosfstools \
              lsof file procps cron ntpsec-ntpdate bsdextrautils \
              wireless-regdb rsync systemd-resolved \
              --no-install-recommends
            apt-get install -y wpasupplicant
            apt-mark hold initramfs-tools 2>/dev/null || true

            # 关键包验证，装失败立即报错
            dpkg -l openssh-server network-manager rsync | grep -c '^ii' | grep -q '^3$' || {
              echo 'ERROR: 关键包安装不完整'
              dpkg -l openssh-server network-manager rsync
              exit 1
            }
            apt-get clean && rm -rf /var/lib/apt/lists/*
          "
          
          # ── 额外包（可选）────────────────────────────────────────────
          if [[ -n "${EXTRA_PKGS}" ]]; then
            echo "▶ 安装额外包: ${EXTRA_PKGS}"
            sudo chroot "${ROOTFS_DIR}" /bin/bash -c "
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y ${EXTRA_PKGS} --no-install-recommends
              apt-get clean && rm -rf /var/lib/apt/lists/*
            "
          fi

          # ── 配置：时区/Locale/Hostname ───────────────────────────────
          sudo chroot "${ROOTFS_DIR}" ln -sf "/usr/share/zoneinfo/${TZ_VAL}" /etc/localtime
          echo "${TZ_VAL}" | sudo tee "${ROOTFS_DIR}/etc/timezone" > /dev/null
          sudo chroot "${ROOTFS_DIR}" bash -c "DEBIAN_FRONTEND=noninteractive dpkg-reconfigure -f noninteractive tzdata"

          sudo chroot "${ROOTFS_DIR}" bash -c "
            sed -i 's/^# *\(en_US.UTF-8\)/\1/' /etc/locale.gen
            locale-gen
            echo 'LANG=en_US.UTF-8' > /etc/default/locale
          "

          echo "${HOSTNAME_VAL}" | sudo tee "${ROOTFS_DIR}/etc/hostname" > /dev/null
          printf '127.0.0.1\tlocalhost\n127.0.1.1\t%s\n::1\tlocalhost ip6-localhost ip6-loopback\n' \
            "${HOSTNAME_VAL}" | sudo tee "${ROOTFS_DIR}/etc/hosts" > /dev/null

          # ── SSH & 服务配置 ──────────────────────────────────────────
          sudo mkdir -p -m 0755 "${ROOTFS_DIR}/var/run/sshd"
          echo 'UG9ydCAyMgpQZXJtaXRSb290TG9naW4geWVzClBhc3N3b3JkQXV0aGVudGljYXRpb24geWVzClB1YmtleUF1dGhlbnRpY2F0aW9uIHllcwpVc2VQQU0geWVzClgxMUZvcndhcmRpbmcgbm8KUHJpbnRNb3RkIG5vCkFjY2VwdEVudiBMQU5HIExDXyoKU3Vic3lzdGVtIHNmdHAgL3Vzci9saWIvb3BlbnNzaC9zZnRwLXNlcnZlcgo=' \
            | base64 -d | sudo tee "${ROOTFS_DIR}/etc/ssh/sshd_config" > /dev/null

          # 设置 Root 密码
          ROOT_HASH="$(openssl passwd -6 "${ROOT_PASSWORD}")"
          sudo sed -i "s|^root:[^:]*|root:${ROOT_HASH}|" "${ROOTFS_DIR}/etc/shadow"

          # ── 网络配置 (NetworkManager + netplan) ─────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/etc/NetworkManager"
          echo 'W21haW5dCnBsdWdpbnM9aWZ1cGRvd24sa2V5ZmlsZQpkaGNwPWludGVybmFsCltpZnVwZG93bl0KbWFuYWdlZD10cnVlCg==' \
            | base64 -d | sudo tee "${ROOTFS_DIR}/etc/NetworkManager/NetworkManager.conf" > /dev/null

          sudo mkdir -p "${ROOTFS_DIR}/etc/netplan"
          sudo cp ubuntu/01-nm-all.yaml "${ROOTFS_DIR}/etc/netplan/01-nm-all.yaml"
          sudo chmod 600 "${ROOTFS_DIR}/etc/netplan/01-nm-all.yaml"

          # 启用服务
          sudo chroot "${ROOTFS_DIR}" systemctl enable ssh
          sudo chroot "${ROOTFS_DIR}" systemctl enable NetworkManager
          sudo chroot "${ROOTFS_DIR}" systemctl enable NetworkManager-dispatcher
          sudo chroot "${ROOTFS_DIR}" systemctl enable chrony
          sudo chroot "${ROOTFS_DIR}" systemctl enable nftables 2>/dev/null || true

          # ── Ubuntu 特有：禁用 snapd ──────────────────────────────────
          sudo chroot "${ROOTFS_DIR}" bash -c "
            systemctl disable snapd.service snapd.socket snapd.seeded.service 2>/dev/null || true
            apt-mark hold snapd 2>/dev/null || true
          "

          # ── Ubuntu 特有：禁用 unattended-upgrades ────────────────────
          sudo chroot "${ROOTFS_DIR}" bash -c "
            systemctl disable unattended-upgrades.service 2>/dev/null || true
            systemctl disable apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
          "

          # ── systemd 超时优化 ──────────────────────────────────────────
          SYS_CONF="${ROOTFS_DIR}/etc/systemd/system.conf"
          [[ -f "${SYS_CONF}" ]] && {
            sudo sed -i "s|^#*DefaultTimeoutStartSec.*|DefaultTimeoutStartSec=10s|g" "${SYS_CONF}"
            sudo sed -i "s|^#*DefaultTimeoutStopSec.*|DefaultTimeoutStopSec=10s|g"   "${SYS_CONF}"
          } || true

          # ── rc.local ──────────────────────────────────────────────────
          if [[ ! -f "${ROOTFS_DIR}/etc/rc.local" ]]; then
            printf '#!/bin/sh -e\nexit 0\n' | sudo tee "${ROOTFS_DIR}/etc/rc.local" > /dev/null
            sudo chmod +x "${ROOTFS_DIR}/etc/rc.local"
          fi

          # ── 注入平台脚本 ─────────────────────────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/usr/lib/ubuntu"
          sudo mkdir -p "${ROOTFS_DIR}/etc/default"
          sudo mkdir -p "${ROOTFS_DIR}/lib/systemd/system"

          for f in ubuntu/ubuntu-firstrun \
                   ubuntu/ubuntu-ramlog \
                   ubuntu/ubuntu-common \
                   ubuntu/ubuntu-hardware-optimization \
                   ubuntu/ubuntu-resize-filesystem \
                   ubuntu/ubuntu-zram-config; do
            sudo cp "${f}" "${ROOTFS_DIR}/usr/lib/ubuntu/$(basename ${f})"
          done
          sudo chmod +x "${ROOTFS_DIR}/usr/lib/ubuntu/"*

          sudo cp ubuntu/ubuntu-release          "${ROOTFS_DIR}/etc/ubuntu-release"
          sudo cp ubuntu/ubuntu-firstrun-etc     "${ROOTFS_DIR}/etc/default/ubuntu-firstrun"
          sudo cp ubuntu/ubuntu-zram-config-etc  "${ROOTFS_DIR}/etc/default/ubuntu-zram-config"
          sudo cp ubuntu/ubuntu-ramlog-etc       "${ROOTFS_DIR}/etc/default/ubuntu-ramlog"
          sudo cp ubuntu/u-u                     "${ROOTFS_DIR}/usr/local/bin/u-u"
          sudo chmod +x "${ROOTFS_DIR}/usr/local/bin/u-u"

          for f in systemd/ubuntu-firstrun.service \
                   systemd/ubuntu-hardware-optimize.service \
                   systemd/ubuntu-resize-filesystem.service \
                   systemd/ubuntu-ramlog.service \
                   systemd/ubuntu-zram-config.service; do
            sudo cp "${f}" "${ROOTFS_DIR}/lib/systemd/system/"
          done

          sudo chroot "${ROOTFS_DIR}" systemctl enable ubuntu-firstrun.service
          sudo chroot "${ROOTFS_DIR}" systemctl enable ubuntu-hardware-optimize.service
          sudo chroot "${ROOTFS_DIR}" systemctl enable ubuntu-resize-filesystem.service
          sudo chroot "${ROOTFS_DIR}" systemctl enable ubuntu-zram-config.service
          sudo chroot "${ROOTFS_DIR}" systemctl enable ubuntu-ramlog.service
          sudo chroot "${ROOTFS_DIR}" systemctl enable systemd-resolved.service

          # ── 禁用不必要的服务 ──────────────────────────────────────────
          sudo chroot "${ROOTFS_DIR}" systemctl disable networking.service 2>/dev/null || true
          sudo chroot "${ROOTFS_DIR}" systemctl disable NetworkManager-wait-online.service 2>/dev/null || true
          sudo chroot "${ROOTFS_DIR}" systemctl disable e2scrub_reap.service 2>/dev/null || true
          sudo chroot "${ROOTFS_DIR}" systemctl disable systemd-pstore.service 2>/dev/null || true

          echo "▶ ubuntu platform scripts injected"

          # ── uInitrd 钩子 ──────────────────────────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/etc/initramfs/post-update.d"
          echo 'IyEvYmluL2Jhc2ggLWUKdGVtcG5hbWU9Ii9ib290L3VJbml0cmQtJDEiCm1raW1hZ2UgLUEgYXJtNjQgLU8gbGludXggLVQgcmFtZGlzayAtQyBnemlwIC1uIHVJbml0cmQgLWQgIiQyIiAiJHt0ZW1wbmFtZX0iCmxuIC1zZnYgIiQoYmFzZW5hbWUgXCIke3RlbXBuYW1lfVwiKSIgL2Jvb3QvdUluaXRyZCB8fCBtdiAtdiAiJHt0ZW1wbmFtZX0iIC9ib290L3VJbml0cmQKZXhpdCAwCg==' \
            | base64 -d | sudo tee "${ROOTFS_DIR}/etc/initramfs/post-update.d/99-uboot" > /dev/null
          sudo chmod +x "${ROOTFS_DIR}/etc/initramfs/post-update.d/99-uboot"

          # ── 禁止 update-initramfs 自动运行 ───────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/etc/initramfs-tools"
          INITRAMFS_CONF="${ROOTFS_DIR}/etc/initramfs-tools/update-initramfs.conf"
          if [[ -f "${INITRAMFS_CONF}" ]]; then
            sudo sed -i "s|^update_initramfs=.*|update_initramfs=no|g" "${INITRAMFS_CONF}"
          else
            echo "update_initramfs=no" | sudo tee "${INITRAMFS_CONF}" > /dev/null
          fi

          # ── fstab ────────────────────────────────────────────────────
          printf 'LABEL=ROOTFS\t/\text4\tdefaults,noatime,nodiratime,commit=600,errors=remount-ro\t0 1\n' \
            | sudo tee    "${ROOTFS_DIR}/etc/fstab" > /dev/null
          printf 'LABEL=BOOT\t/boot\tvfat\tdefaults\t0 2\n' \
            | sudo tee -a "${ROOTFS_DIR}/etc/fstab" > /dev/null

          # ── 预建目录 ──────────────────────────────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/usr/lib/modules"

          echo "▶ rootfs 完成: $(sudo du -sh ${ROOTFS_DIR} | awk '{print $1}')"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 4. 打包 tar.gz + sha256 ───────────────────────────────────────
      - name: Package rootfs
        id: package
        if: ${{ steps.rootfs.outputs.status == 'success' && !cancelled() }}
        run: |
          set -euo pipefail
          OUT_DIR="${GITHUB_WORKSPACE}/output"
          mkdir -p "${OUT_DIR}"

          TARBALL="Ubuntu_${UBUNTU_RELEASE}_rootfs.tar.gz"
          echo "▶ 打包 → ${TARBALL} ..."
          sudo tar -czf "${OUT_DIR}/${TARBALL}" -C "${ROOTFS_DIR}" .
          echo "▶ 大小: $(du -sh ${OUT_DIR}/${TARBALL} | awk '{print $1}')"

          cd "${OUT_DIR}"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          echo "▶ $(cat ${TARBALL}.sha256)"

          BUILT_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "TARBALL=${TARBALL}"       >> "${GITHUB_OUTPUT}"
          echo "OUT_DIR=${OUT_DIR}"       >> "${GITHUB_OUTPUT}"
          echo "BUILT_DATE=${BUILT_DATE}" >> "${GITHUB_OUTPUT}"
          echo "status=success"           >> "${GITHUB_OUTPUT}"

      # ── 5. 发布到 Release ─────────────────────────────────────────────
      - name: Publish to Release
        uses: ncipollo/release-action@main
        if: ${{ steps.package.outputs.status == 'success' && !cancelled() }}
        with:
          tag: "RootFS_${{ env.UBUNTU_RELEASE }}_${{ github.run_id }}"
          name: "Ubuntu ${{ env.UBUNTU_RELEASE }} RootFS · ${{ steps.package.outputs.BUILT_DATE }}"
          artifacts: |
            ${{ steps.package.outputs.OUT_DIR }}/${{ steps.package.outputs.TARBALL }}
            ${{ steps.package.outputs.OUT_DIR }}/${{ steps.package.outputs.TARBALL }}.sha256
          allowUpdates: false
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Ubuntu ${{ env.UBUNTU_RELEASE }} arm64 RootFS

            | 项目 | 值 |
            |------|-----|
            | Ubuntu 版本 | `${{ env.UBUNTU_RELEASE }}` |
            | 时区 | `${{ env.TZ_VAL }}` |
            | 主机名 | `${{ env.HOSTNAME_VAL }}` |
            | 构建时间 | `${{ steps.package.outputs.BUILT_DATE }}` |
            | Run ID | `${{ github.run_id }}` |

            ## 在 build-ubuntu-amlogic.yml 中复用此 rootfs

            触发镜像构建时，在 **rootfs_url** 输入框填入以下链接，跳过 60-90 分钟的 debootstrap：

            ```
            https://github.com/${{ github.repository }}/releases/download/RootFS_${{ env.UBUNTU_RELEASE }}_${{ github.run_id }}/Ubuntu_${{ env.UBUNTU_RELEASE }}_rootfs.tar.gz
            ```

            ## 内容说明

            - 纯净 Ubuntu `${{ env.UBUNTU_RELEASE }}` arm64（noble=24.04 LTS / resolute=26.04 LTS）
            - Ubuntu 官方 ports apt 源（DEB822 格式，main/restricted/universe/multiverse）
            - 已配置：SSH root 登录、NetworkManager、en_US.UTF-8 locale、时区
            - 已配置：uInitrd 钩子（u-boot 兼容 initramfs 格式）
            - 已禁用：snapd、unattended-upgrades（嵌入式不需要）
            - 已设置：`update_initramfs=no`（内核注入由 rebuild 脚本接管）
            - resolute(26.04) 专项：强制使用 `initramfs-tools` 替代默认 dracut
            - fstab 使用 `LABEL=ROOTFS/BOOT` 占位符，rebuild 时替换为真实 UUID
