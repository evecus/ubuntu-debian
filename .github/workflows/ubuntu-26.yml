#==========================================================================
# 用途：Ubuntu 26.04 一体化构建流水线（panther-x2 / RK3566）
#
# 两种模式（由 rootfs_url 决定）：
#   ① 未填 rootfs_url → 从零构建 rootfs → rebuild 注入内核/uboot
#                       → 将 rootfs.tar.gz 与固件 .img.gz 一起发布 Release
#   ② 已填 rootfs_url → 跳过 rootfs 构建，直接下载已有 rootfs → rebuild
#                       → 仅将固件 .img.gz 发布 Release
#==========================================================================
name: Build Ubuntu 26.04 (RootFS + Firmware)

on:
  workflow_dispatch:
    inputs:
      rootfs_url:
        description: "已有 rootfs tar.gz 下载地址（留空则自动构建 rootfs）"
        required: false
        default: ""
        type: string

      # ── rootfs 构建参数（仅在不提供 rootfs_url 时生效）──────────────
      root_password:
        description: "[构建 rootfs] root 密码"
        required: false
        default: "1234"
        type: string

      hostname:
        description: "[构建 rootfs] 主机名"
        required: false
        default: "ubuntu"
        type: string

      timezone:
        description: "[构建 rootfs] 时区"
        required: false
        default: "Asia/Shanghai"
        type: choice
        options:
          - Asia/Shanghai
          - Asia/Tokyo
          - America/New_York
          - Europe/London
          - UTC

      extra_packages:
        description: "[构建 rootfs] 额外安装包（空格分隔，留空则只安装基础包）"
        required: false
        default: ""
        type: string

      # ── rebuild / 固件参数（始终生效）──────────────────────────────
      debian_release:
        description: "镜像版本标识（用于 Release 命名）"
        required: false
        default: "resolute"
        type: choice
        options:
          - resolute

      armbian_kernel:
        description: "内核版本（panther-x2 使用 stable 系列）"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.12.y
          - 6.1.y

      armbian_fstype:
        description: "rootfs 文件系统类型"
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs

      builder_name:
        description: "构建者签名"
        required: false
        default: "mybuilder"
        type: string

env:
  TZ: UTC
  UBUNTU_MIRROR: "http://ports.ubuntu.com/ubuntu-ports"
  ROOTFS_DIR: /builder/ubuntu-rootfs
  BOARD: panther-x2

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # 原生 arm64，debootstrap 无需 qemu
    permissions:
      contents: write
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════════════
      # 阶段 1：初始化环境
      # ════════════════════════════════════════════════════════════════════
      - name: Initialize environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # ── 清理不需要的大型软件，腾出空间 ──────────────────────────
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile

          sudo -E apt-get -y update
          sudo -E apt-get -y purge \
            azure-cli ghc* zulu* llvm* firefox google* dotnet* \
            powershell openjdk* mongodb* moby* 2>/dev/null || true

          # ── 安装两个阶段所需工具（取两个 workflow 的并集）──────────
          sudo -E apt-get -y install \
            debootstrap \
            parted e2fsprogs dosfstools btrfs-progs \
            u-boot-tools uuid-runtime openssl pigz \
            git curl wget xz-utils lz4 zstd pv jq rsync
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo -E timedatectl set-timezone "${TZ}"

          # ── 将常用参数写入环境变量，方便后续步骤引用 ─────────────
          echo "UBUNTU_RELEASE=${{ inputs.debian_release  || 'resolute' }}" >> "${GITHUB_ENV}"
          echo "ROOT_PASSWORD=${{ inputs.root_password    || '1234' }}"      >> "${GITHUB_ENV}"
          echo "HOSTNAME_VAL=${{ inputs.hostname          || 'ubuntu' }}"    >> "${GITHUB_ENV}"
          echo "TZ_VAL=${{ inputs.timezone                || 'Asia/Shanghai' }}" >> "${GITHUB_ENV}"
          echo "EXTRA_PKGS=${{ inputs.extra_packages      || '' }}"           >> "${GITHUB_ENV}"

          # ── 判断模式：有 URL → skip_build=true ───────────────────
          if [[ -n "${{ inputs.rootfs_url }}" ]]; then
            echo "SKIP_ROOTFS_BUILD=true"  >> "${GITHUB_ENV}"
          else
            echo "SKIP_ROOTFS_BUILD=false" >> "${GITHUB_ENV}"
          fi

          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ════════════════════════════════════════════════════════════════════
      # 阶段 2：合并磁盘空间（/mnt + / → /builder，约 44 GB）
      # ════════════════════════════════════════════════════════════════════
      - name: Create build disk
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}G"  /mnt/mnt.img
          sudo truncate -s "${root_size}G" /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          echo "可用空间: $(df -h /builder | tail -1 | awk '{print $4}')"

      # ════════════════════════════════════════════════════════════════════
      # 阶段 3A：从零构建 rootfs（仅在未提供 rootfs_url 时运行）
      # ════════════════════════════════════════════════════════════════════
      - name: Build Ubuntu rootfs
        id: rootfs_build
        if: ${{ env.SKIP_ROOTFS_BUILD == 'false' && !cancelled() }}
        run: |
          set -euo pipefail

          # ── debootstrap ────────────────────────────────────────────────
          echo "▶ debootstrap (${UBUNTU_RELEASE})..."
          sudo mkdir -p "${ROOTFS_DIR}"
          sudo debootstrap \
            --arch=arm64 --include=ca-certificates \
            "${UBUNTU_RELEASE}" "${ROOTFS_DIR}" "${UBUNTU_MIRROR}/"

          # ── 挂载虚拟文件系统 ──────────────────────────────────────────
          echo "▶ 挂载虚拟文件系统..."
          sudo mount -t proc  /proc        "${ROOTFS_DIR}/proc"
          sudo mount -t sysfs /sys         "${ROOTFS_DIR}/sys"
          sudo mount --bind   /dev         "${ROOTFS_DIR}/dev"
          sudo mount --bind   /dev/pts     "${ROOTFS_DIR}/dev/pts"

          function cleanup {
            echo "▶ 正在卸载虚拟文件系统..."
            sudo umount -l "${ROOTFS_DIR}/proc"    || true
            sudo umount -l "${ROOTFS_DIR}/sys"     || true
            sudo umount -l "${ROOTFS_DIR}/dev/pts" || true
            sudo umount -l "${ROOTFS_DIR}/dev"     || true
          }
          trap cleanup EXIT

          # ── apt 源（DEB822 格式）──────────────────────────────────────
          sudo rm -f "${ROOTFS_DIR}/etc/apt/sources.list"
          sudo tee "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources" > /dev/null << 'SOURCES_EOF'
          Types: deb
          URIs: MIRROR_PLACEHOLDER
          Suites: RELEASE_PLACEHOLDER RELEASE_PLACEHOLDER-updates RELEASE_PLACEHOLDER-backports RELEASE_PLACEHOLDER-security
          Components: main restricted universe multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES_EOF
          sudo sed -i "s|MIRROR_PLACEHOLDER|${UBUNTU_MIRROR}|g"   "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources"
          sudo sed -i "s|RELEASE_PLACEHOLDER|${UBUNTU_RELEASE}|g" "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources"
          sudo sed -i 's/^[[:space:]]*//' "${ROOTFS_DIR}/etc/apt/sources.list.d/ubuntu.sources"

          echo "▶ 安装基础软件包..."
          sudo chroot "${ROOTFS_DIR}" /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq

            # resolute(26.04) 强制使用 initramfs-tools 替代默认 dracut
            apt-get install -y dracut- initramfs-tools --no-install-recommends 2>/dev/null || \
            apt-get install -y initramfs-tools --no-install-recommends

            apt-get install -y \
              openssh-server sudo curl wget ca-certificates \
              locales tzdata fdisk \
              network-manager chrony nftables \
              bash-completion vim nano less \
              systemd-sysv udev dbus \
              iproute2 iputils-ping net-tools \
              e2fsprogs parted \
              apt-utils 2>/dev/null || true
          "

          # ── 额外包 ────────────────────────────────────────────────────
          if [[ -n "${EXTRA_PKGS}" ]]; then
            echo "▶ 安装额外包: ${EXTRA_PKGS}"
            sudo chroot "${ROOTFS_DIR}" /bin/bash -c "
              export DEBIAN_FRONTEND=noninteractive
              apt-get install -y ${EXTRA_PKGS}
            "
          fi

          # ── locale / timezone / hostname ──────────────────────────────
          sudo chroot "${ROOTFS_DIR}" /bin/bash -c "
            locale-gen en_US.UTF-8
            update-locale LANG=en_US.UTF-8
            ln -sf /usr/share/zoneinfo/${TZ_VAL} /etc/localtime
            echo '${TZ_VAL}' > /etc/timezone
            echo '${HOSTNAME_VAL}' > /etc/hostname
          "

          # ── root 密码 ─────────────────────────────────────────────────
          echo "root:${ROOT_PASSWORD}" | sudo chroot "${ROOTFS_DIR}" chpasswd

          # ── SSH root 登录 ─────────────────────────────────────────────
          sudo sed -i "s|^#*PermitRootLogin.*|PermitRootLogin yes|g" \
            "${ROOTFS_DIR}/etc/ssh/sshd_config"

          # ── NetworkManager 配置 ───────────────────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/etc/NetworkManager/conf.d"
          sudo tee "${ROOTFS_DIR}/etc/NetworkManager/conf.d/10-globally-managed-devices.conf" > /dev/null << 'NM_EOF'
          [keyfile]
          unmanaged-devices=none
          NM_EOF
          sudo sed -i 's/^[[:space:]]*//' \
            "${ROOTFS_DIR}/etc/NetworkManager/conf.d/10-globally-managed-devices.conf"

          # netplan（如存在 ubuntu/01-nm-all.yaml 则复制，否则内联生成）
          sudo mkdir -p "${ROOTFS_DIR}/etc/netplan"
          if [[ -f "ubuntu/01-nm-all.yaml" ]]; then
            sudo cp ubuntu/01-nm-all.yaml "${ROOTFS_DIR}/etc/netplan/01-nm-all.yaml"
          else
            sudo tee "${ROOTFS_DIR}/etc/netplan/01-nm-all.yaml" > /dev/null << 'NETPLAN_EOF'
          network:
            version: 2
            renderer: NetworkManager
          NETPLAN_EOF
            sudo sed -i 's/^[[:space:]]*//' "${ROOTFS_DIR}/etc/netplan/01-nm-all.yaml"
          fi
          sudo chmod 600 "${ROOTFS_DIR}/etc/netplan/01-nm-all.yaml"

          # ── 启用服务 ──────────────────────────────────────────────────
          sudo chroot "${ROOTFS_DIR}" systemctl enable ssh
          sudo chroot "${ROOTFS_DIR}" systemctl enable NetworkManager
          sudo chroot "${ROOTFS_DIR}" systemctl enable NetworkManager-dispatcher
          sudo chroot "${ROOTFS_DIR}" systemctl enable chrony
          sudo chroot "${ROOTFS_DIR}" systemctl enable nftables 2>/dev/null || true

          # ── Ubuntu 特有：禁用 snapd / unattended-upgrades ─────────────
          sudo chroot "${ROOTFS_DIR}" bash -c "
            systemctl disable snapd.service snapd.socket snapd.seeded.service 2>/dev/null || true
            apt-mark hold snapd 2>/dev/null || true
            systemctl disable unattended-upgrades.service 2>/dev/null || true
            systemctl disable apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
          "

          # ── systemd 超时优化 ──────────────────────────────────────────
          SYS_CONF="${ROOTFS_DIR}/etc/systemd/system.conf"
          [[ -f "${SYS_CONF}" ]] && {
            sudo sed -i "s|^#*DefaultTimeoutStartSec.*|DefaultTimeoutStartSec=10s|g" "${SYS_CONF}"
            sudo sed -i "s|^#*DefaultTimeoutStopSec.*|DefaultTimeoutStopSec=10s|g"   "${SYS_CONF}"
          } || true

          # ── rc.local ──────────────────────────────────────────────────
          if [[ ! -f "${ROOTFS_DIR}/etc/rc.local" ]]; then
            printf '#!/bin/sh -e\nexit 0\n' | sudo tee "${ROOTFS_DIR}/etc/rc.local" > /dev/null
            sudo chmod +x "${ROOTFS_DIR}/etc/rc.local"
          fi

          # ── 注入平台脚本（如仓库中存在则复制，否则跳过）─────────────
          sudo mkdir -p "${ROOTFS_DIR}/usr/lib/ubuntu"
          sudo mkdir -p "${ROOTFS_DIR}/etc/default"
          sudo mkdir -p "${ROOTFS_DIR}/lib/systemd/system"

          for f in ubuntu/ubuntu-firstrun \
                   ubuntu/ubuntu-ramlog \
                   ubuntu/ubuntu-common \
                   ubuntu/ubuntu-hardware-optimization \
                   ubuntu/ubuntu-resize-filesystem \
                   ubuntu/ubuntu-zram-config; do
            [[ -f "${f}" ]] && sudo cp "${f}" "${ROOTFS_DIR}/usr/lib/ubuntu/$(basename ${f})" || true
          done
          sudo chmod +x "${ROOTFS_DIR}/usr/lib/ubuntu/"* 2>/dev/null || true

          for src_dst in \
            "ubuntu/ubuntu-release:${ROOTFS_DIR}/etc/ubuntu-release" \
            "ubuntu/ubuntu-firstrun-etc:${ROOTFS_DIR}/etc/default/ubuntu-firstrun" \
            "ubuntu/ubuntu-zram-config-etc:${ROOTFS_DIR}/etc/default/ubuntu-zram-config" \
            "ubuntu/ubuntu-ramlog-etc:${ROOTFS_DIR}/etc/default/ubuntu-ramlog" \
            "ubuntu/u-u:${ROOTFS_DIR}/usr/local/bin/u-u"; do
            src="${src_dst%%:*}"; dst="${src_dst##*:}"
            [[ -f "${src}" ]] && sudo cp "${src}" "${dst}" || true
          done
          [[ -f "${ROOTFS_DIR}/usr/local/bin/u-u" ]] && \
            sudo chmod +x "${ROOTFS_DIR}/usr/local/bin/u-u" || true

          for f in systemd/ubuntu-firstrun.service \
                   systemd/ubuntu-hardware-optimize.service \
                   systemd/ubuntu-resize-filesystem.service \
                   systemd/ubuntu-ramlog.service \
                   systemd/ubuntu-zram-config.service; do
            [[ -f "${f}" ]] && sudo cp "${f}" "${ROOTFS_DIR}/lib/systemd/system/" || true
          done

          for svc in ubuntu-firstrun ubuntu-hardware-optimize ubuntu-resize-filesystem \
                     ubuntu-zram-config ubuntu-ramlog; do
            sudo chroot "${ROOTFS_DIR}" systemctl enable "${svc}.service" 2>/dev/null || true
          done
          sudo chroot "${ROOTFS_DIR}" systemctl enable systemd-resolved.service

          # ── 禁用不必要的服务 ──────────────────────────────────────────
          for svc in networking NetworkManager-wait-online e2scrub_reap systemd-pstore; do
            sudo chroot "${ROOTFS_DIR}" systemctl disable "${svc}.service" 2>/dev/null || true
          done

          # ── uInitrd 钩子 ──────────────────────────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/etc/initramfs/post-update.d"
          echo 'IyEvYmluL2Jhc2ggLWUKdGVtcG5hbWU9Ii9ib290L3VJbml0cmQtJDEiCm1raW1hZ2UgLUEgYXJtNjQgLU8gbGludXggLVQgcmFtZGlzayAtQyBnemlwIC1uIHVJbml0cmQgLWQgIiQyIiAiJHt0ZW1wbmFtZX0iCmxuIC1zZnYgIiQoYmFzZW5hbWUgXCIke3RlbXBuYW1lfVwiKSIgL2Jvb3QvdUluaXRyZCB8fCBtdiAtdiAiJHt0ZW1wbmFtZX0iIC9ib290L3VJbml0cmQKZXhpdCAwCg==' \
            | base64 -d | sudo tee "${ROOTFS_DIR}/etc/initramfs/post-update.d/99-uboot" > /dev/null
          sudo chmod +x "${ROOTFS_DIR}/etc/initramfs/post-update.d/99-uboot"

          # ── 禁止 update-initramfs 自动运行 ───────────────────────────
          sudo mkdir -p "${ROOTFS_DIR}/etc/initramfs-tools"
          INITRAMFS_CONF="${ROOTFS_DIR}/etc/initramfs-tools/update-initramfs.conf"
          if [[ -f "${INITRAMFS_CONF}" ]]; then
            sudo sed -i "s|^update_initramfs=.*|update_initramfs=no|g" "${INITRAMFS_CONF}"
          else
            echo "update_initramfs=no" | sudo tee "${INITRAMFS_CONF}" > /dev/null
          fi

          # ── fstab ─────────────────────────────────────────────────────
          printf 'LABEL=ROOTFS\t/\text4\tdefaults,noatime,nodiratime,commit=600,errors=remount-ro\t0 1\n' \
            | sudo tee    "${ROOTFS_DIR}/etc/fstab" > /dev/null
          printf 'LABEL=BOOT\t/boot\tvfat\tdefaults\t0 2\n' \
            | sudo tee -a "${ROOTFS_DIR}/etc/fstab" > /dev/null

          sudo mkdir -p "${ROOTFS_DIR}/usr/lib/modules"

          echo "▶ rootfs 构建完成: $(sudo du -sh ${ROOTFS_DIR} | awk '{print $1}')"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 打包 rootfs（仅在自行构建时）──────────────────────────────────
      - name: Package rootfs tarball
        id: package_rootfs
        if: ${{ env.SKIP_ROOTFS_BUILD == 'false' && steps.rootfs_build.outputs.status == 'success' && !cancelled() }}
        run: |
          set -euo pipefail
          OUT_DIR="${GITHUB_WORKSPACE}/output"
          mkdir -p "${OUT_DIR}"

          TARBALL="Ubuntu_${UBUNTU_RELEASE}_rootfs_${{ github.run_number }}.tar.gz"
          echo "▶ 打包 → ${TARBALL} ..."
          sudo tar -czf "${OUT_DIR}/${TARBALL}" -C "${ROOTFS_DIR}" .
          echo "▶ 大小: $(du -sh ${OUT_DIR}/${TARBALL} | awk '{print $1}')"

          cd "${OUT_DIR}"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"

          BUILT_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "TARBALL=${TARBALL}"                 >> "${GITHUB_OUTPUT}"
          echo "TARBALL_PATH=${OUT_DIR}/${TARBALL}" >> "${GITHUB_OUTPUT}"
          echo "SHA256_PATH=${OUT_DIR}/${TARBALL}.sha256" >> "${GITHUB_OUTPUT}"
          echo "OUT_DIR=${OUT_DIR}"                 >> "${GITHUB_OUTPUT}"
          echo "BUILT_DATE=${BUILT_DATE}"           >> "${GITHUB_OUTPUT}"
          echo "status=success"                     >> "${GITHUB_OUTPUT}"

      # ════════════════════════════════════════════════════════════════════
      # 阶段 3B：下载已有 rootfs（仅在提供了 rootfs_url 时运行）
      # ════════════════════════════════════════════════════════════════════
      - name: Download existing rootfs
        id: rootfs_download
        if: ${{ env.SKIP_ROOTFS_BUILD == 'true' && !cancelled() }}
        run: |
          set -euo pipefail
          ROOTFS_URL="${{ inputs.rootfs_url }}"
          sudo mkdir -p "${ROOTFS_DIR}"
          echo "▶ 正在下载 rootfs: ${ROOTFS_URL}"
          wget -q --show-progress -O /tmp/rootfs.tar.gz "${ROOTFS_URL}"
          echo "▶ 正在解压..."
          sudo tar -xf /tmp/rootfs.tar.gz -C "${ROOTFS_DIR}"
          rm -f /tmp/rootfs.tar.gz
          [[ -d "${ROOTFS_DIR}/etc" ]] || { echo "::error::rootfs 结构非法，缺少 /etc"; exit 1; }
          echo "▶ 解压完成，占用空间: $(sudo du -sh ${ROOTFS_DIR} | awk '{print $1}')"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ════════════════════════════════════════════════════════════════════
      # 阶段 4：将 rootfs 打包成 Armbian 格式 .img（rebuild 脚本的输入）
      # ════════════════════════════════════════════════════════════════════
      - name: Pack rootfs into Armbian-format image
        id: pack
        if: >-
          ${{
            !cancelled() && (
              (env.SKIP_ROOTFS_BUILD == 'false' && steps.rootfs_build.outputs.status == 'success') ||
              (env.SKIP_ROOTFS_BUILD == 'true'  && steps.rootfs_download.outputs.status == 'success')
            )
          }}
        run: |
          set -euo pipefail

          REBUILD_DIR="${GITHUB_WORKSPACE}/rebuild"
          IMG_DIR="${REBUILD_DIR}/build/output/images"
          mkdir -p "${IMG_DIR}"

          IMG_NAME="Armbian_22.02.0-trunk_${{ inputs.debian_release }}_arm64.img"
          IMG_PATH="${IMG_DIR}/${IMG_NAME}"

          ROOTFS_MB=$(sudo du -sm "${ROOTFS_DIR}" | awk '{print $1}')
          echo "▶ rootfs 实际大小: ${ROOTFS_MB}MiB，创建 6G 稀疏镜像"
          sudo truncate -s 6G "${IMG_PATH}"

          sudo parted -s "${IMG_PATH}" mklabel msdos
          sudo parted -s "${IMG_PATH}" mkpart primary ext4 4MiB 100%

          LOOP=$(sudo losetup -P -f --show "${IMG_PATH}")
          echo "▶ loop device: ${LOOP}"

          sudo mkfs.ext4 -F -q -L "ROOTFS" -b 4096 -m 1 "${LOOP}p1"

          MNT=$(mktemp -d)
          sudo mount "${LOOP}p1" "${MNT}"
          echo "▶ 正在写入 rootfs..."
          sudo rsync -a "${ROOTFS_DIR}/" "${MNT}/"
          sudo sync
          sudo umount "${MNT}"
          sudo losetup -d "${LOOP}"
          rmdir "${MNT}"

          echo "▶ 镜像写入完成: $(du -sh ${IMG_PATH})"
          echo "img_path=${IMG_PATH}"   >> "${GITHUB_OUTPUT}"
          echo "img_outdir=${IMG_DIR}"  >> "${GITHUB_OUTPUT}"
          echo "status=success"         >> "${GITHUB_OUTPUT}"

      # ════════════════════════════════════════════════════════════════════
      # 阶段 5：Rebuild — 注入内核 + uboot + 平台文件
      # ════════════════════════════════════════════════════════════════════
      - name: Rebuild image
        id: rebuild
        if: ${{ steps.pack.outputs.status == 'success' && !cancelled() }}
        env:
          KERNEL:  ${{ inputs.armbian_kernel }}
          FSTYPE:  ${{ inputs.armbian_fstype }}
          BUILDER: ${{ inputs.builder_name }}
        run: |
          set -euo pipefail

          # rebuild 执行时会 rm -rf tmp_dir 再 mkdir，软链接会被破坏
          # 直接移到大盘，让 PWD/tmp_dir 天然落在大盘上
          sudo mv "${GITHUB_WORKSPACE}/rebuild" /builder/rebuild
          sudo ln -sfn /builder/rebuild "${GITHUB_WORKSPACE}/rebuild"
          sudo chown -R runner:runner /builder/rebuild
          REBUILD_DIR="/builder/rebuild"

          sudo chmod +x "${REBUILD_DIR}/rebuild"
          cd "${REBUILD_DIR}"

          echo "▶ 执行 rebuild: board=${BOARD} kernel=${KERNEL} fstype=${FSTYPE}"
          sudo ./rebuild \
            -b ${BOARD} \
            -k ${KERNEL} \
            -a true \
            -t ${FSTYPE} \
            -s 512/2500 \
            -r ophub/kernel \
            -n ${BUILDER}

          OUTPUT_DIR="${REBUILD_DIR}/build/output/images"
          ls -lh "${OUTPUT_DIR}/"

          PACKAGED_FILE="$(ls ${OUTPUT_DIR}/*.img.gz 2>/dev/null | head -1)"
          [[ -z "${PACKAGED_FILE}" ]] && { echo "::error::rebuild 未生成 .img.gz"; exit 1; }

          echo "PACKAGED_OUTPUTPATH=${OUTPUT_DIR}" >> "${GITHUB_ENV}"
          echo "PACKAGED_STATUS=success"           >> "${GITHUB_ENV}"

      # ════════════════════════════════════════════════════════════════════
      # 阶段 6A：发布 Release（自行构建 rootfs 模式）
      #   → 同时上传 rootfs.tar.gz + 固件 .img.gz
      # ════════════════════════════════════════════════════════════════════
      - name: Upload to Release (with rootfs)
        uses: ncipollo/release-action@main
        if: >-
          ${{
            env.PACKAGED_STATUS == 'success' &&
            env.SKIP_ROOTFS_BUILD == 'false' &&
            steps.package_rootfs.outputs.status == 'success'
          }}
        with:
          tag: "Ubuntu_${{ inputs.debian_release }}_${{ inputs.armbian_kernel }}_${{ github.run_number }}"
          name: "Ubuntu ${{ inputs.debian_release }} · panther-x2 · ${{ inputs.armbian_kernel }} · #${{ github.run_number }}"
          artifacts: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz*
            ${{ steps.package_rootfs.outputs.TARBALL_PATH }}
            ${{ steps.package_rootfs.outputs.SHA256_PATH }}
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Ubuntu ${{ inputs.debian_release }} for panther-x2 (RK3566)

            > 本次从零构建 rootfs，并一并发布，可直接复用链接跳过下次 rootfs 构建。

            | 参数 | 值 |
            |------|-----|
            | Ubuntu 版本 | `${{ inputs.debian_release }}` |
            | 内核 | `${{ inputs.armbian_kernel }}` |
            | 文件系统 | `${{ inputs.armbian_fstype }}` |
            | 主机名 | `${{ env.HOSTNAME_VAL }}` |
            | 时区 | `${{ env.TZ_VAL }}` |
            | 构建编号 | `#${{ github.run_number }}` |
            | 构建时间 | `${{ steps.package_rootfs.outputs.BUILT_DATE }}` |

            ## 复用 rootfs 链接

            下次触发时在 **rootfs_url** 输入以下地址，可跳过 debootstrap（节省 60-90 分钟）：

            ```
            https://github.com/${{ github.repository }}/releases/download/Ubuntu_${{ inputs.debian_release }}_${{ inputs.armbian_kernel }}_${{ github.run_number }}/${{ steps.package_rootfs.outputs.TARBALL }}
            ```

      # ════════════════════════════════════════════════════════════════════
      # 阶段 6B：发布 Release（使用已有 rootfs 模式）
      #   → 仅上传固件 .img.gz
      # ════════════════════════════════════════════════════════════════════
      - name: Upload to Release (firmware only)
        uses: ncipollo/release-action@main
        if: >-
          ${{
            env.PACKAGED_STATUS == 'success' &&
            env.SKIP_ROOTFS_BUILD == 'true'
          }}
        with:
          tag: "Ubuntu_${{ inputs.debian_release }}_${{ inputs.armbian_kernel }}_${{ github.run_number }}"
          name: "Ubuntu ${{ inputs.debian_release }} · panther-x2 · ${{ inputs.armbian_kernel }} · #${{ github.run_number }}"
          artifacts: "${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Ubuntu ${{ inputs.debian_release }} for panther-x2 (RK3566)

            > 本次使用已有 rootfs 进行 rebuild。

            | 参数 | 值 |
            |------|-----|
            | 来源 rootfs | `${{ inputs.rootfs_url }}` |
            | 内核 | `${{ inputs.armbian_kernel }}` |
            | 文件系统 | `${{ inputs.armbian_fstype }}` |
            | 构建编号 | `#${{ github.run_number }}` |
